<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>student registration</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
        <link rel="stylesheet" href="styl.css">			
    </head>
	<body>
        <div id="header"><h1><button class="btn btn-danger" onclick="show()">Please click here to enter student information</button></h1></div>
        <div class="container1">
            <form id="info" onsubmit="return _error() ">

                <div class="from-control">
					<label for="Studint_Name">Student Name:</label>
					<input type="text" id="Studint_Name" placeholder="Ahmad" />
				</div>
                <div id="demo1"></div><br>


				<div class="from-control">
					<label for="Studint_Id">Student ID :</label>
					<input type="number" id="Studint_Id" placeholder="11923771" />
				</div>
                <div id="demo2"></div><br>


				<div class="from-control">
					<label for="Studint_GPA">Student GPA :</label>
					<input type="number" id="Studint_GPA" placeholder="2.5" />
				</div>
                <div id="demo3"></div><br>
				<br><br>
                <button id="submit" class="btn btn-danger" type="submit" onclick="_error()">Click to Add_St</button>
                <button id="Delete" class="btn btn-danger" type="submit">Click to Delete_St</button>
				<button id="updata" class="btn btn-danger" type="submit">Click to Updata_St</button> 
			</form>
		</div>
        <script src="js.js"></script>
	</body>
</html>
